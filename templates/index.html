<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grammar & Spell Checker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            margin-top: 50px;
            max-width: 750px;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        textarea {
            height: 180px;
            resize: none;
            border-radius: 10px;
        }

        .btn-primary {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
        }

        .output-box {
            margin-top: 25px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            color: black;
        }

        .mistakes {
            color: red;
            font-weight: bold;
        }

        .download-btn {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔡 Grammar & Spell Checker 🔡</h1>

    <div class="card">

        <form action="/spell" method="POST" enctype="multipart/form-data">

            <label>Enter your text:</label>
            <textarea class="form-control" name="text">{{ input_text }}</textarea>

            <br>

            <label>Or upload a .txt file:</label>
            <input type="file" class="form-control" name="file">

            <button type="submit" class="btn btn-primary">Check Text</button>
        </form>

        {% if corrected_text %}
        <div class="output-box">
            <h5>Corrected Text:</h5>
            <p>{{ corrected_text }}</p>

            <p class="mistakes">Mistakes Found: {{ mistakes }}</p>

            <!-- Download Button -->
            <form action="/download" method="POST">
                <input type="hidden" name="corrected_text" value="{{ corrected_text }}">
                <button type="submit" class="btn btn-success download-btn">
                    ⬇️ Download Corrected Text
                </button>
            </form>

        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
